{% for hadiah in hadiah_list %}
<div class="bg-white rounded-xl shadow-md p-5 border border-gray-100">
  
  <span class="inline-flex w-fit bg-gradient-to-t from-blue-900 to-blue-700 text-white text-s font-semibold px-3 py-1 rounded-full mb-3">
    {{ hadiah.kode_hadiah }} - {{ hadiah.nama_mitra }}
  </span>

  <h2 class="text-xl font-bold text-gray-900 mb-1">{{ hadiah.nama }}</h2>

  <p class="text-sm text-gray-500 mb-3">{{ hadiah.deskripsi }}</p>

  <p class="text-sm font-bold text-gray-800 mb-1">{{ hadiah.miles|floatformat:0 }} miles</p>

  <p class="text-sm text-gray-600 mb-4">
    Periode: {{ hadiah.valid_start_date }} -- {{ hadiah.program_end }}
  </p>

  <button
    data-kode="{{ hadiah.kode_hadiah }}"
    data-mitra="{{ hadiah.nama_mitra }}"
    data-nama="{{ hadiah.nama }}"
    data-miles="{{ hadiah.miles|floatformat:0 }}"
    onclick="bukaModal(this.dataset.kode, this.dataset.mitra, this.dataset.nama, this.dataset.miles)"
    class="bg-gradient-to-t from-red-900 to-red-700 hover:bg-red-700 text-white font-bold text-s px-5 py-2 rounded-lg transition-colors duration-200">
    REDEEM
  </button>

</div>
{% empty %}
<div class="col-span-3 text-center text-gray-400 py-10">Tidak ada hadiah tersedia.</div>
{% endfor %}
