<div class="bg-white rounded-xl shadow overflow-hidden">
  <table class="w-full">
    <thead class="bg-gray-50 border-b border-gray-100">
      <tr class="text-gray-500 text-left text-sm">
        <th class="px-5 py-4 font-bold">Hadiah</th>
        <th class="px-5 py-4 font-bold">Waktu</th>
        <th class="px-5 py-4 font-bold">Miles</th>
        <th class="px-5 py-4 font-bold">Status</th>
      </tr>
    </thead>
    <tbody>
      {% for r in riwayat_redeem %}
      <tr class="border-t border-gray-100 text-sm text-gray-700">
        <td class="px-5 py-4 font-medium">{{ r.nama_hadiah }}</td>
        <td class="px-5 py-4">{{ r.tanggal }}</td>
        <td class="px-5 py-4 font-bold text-red-500">-{{ r.miles|floatformat:0 }}</td>
        <td class="px-5 py-4">🔒</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="4" class="px-5 py-10 text-center text-gray-400">Belum ada riwayat redeem.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
