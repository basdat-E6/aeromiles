{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center py-12">
    
    <div class="text-center mb-8">
        <div class="bg-linear-to-r from-blue-950 to-sky-700 text-white w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg">
            <svg class="h-6 w-6 fill-current" viewBox="0 0 24 24">
                <path d="M18.8286 1.72758C19.618 1.37176 21.0449 0.981099 22.1457 2.08172C23.2466 3.18244 22.8558 4.60949 22.5 5.39885C22.2409 5.97353 21.8851 6.58498 21.4343 7.03586L18.3035 10.1667L20.75 19.9527C21.0686 21.2273 19.4017 22.0136 18.6208 20.957L13.9001 14.5701L11.0678 17.4024L10.4818 21.504C10.326 22.5944 8.90642 22.9164 8.29541 21.9999L5.86325 18.3517L1.89476 15.6042C0.960857 14.9577 1.36456 13.4958 2.49799 13.4203L6.85509 13.1298L9.65741 10.3275L3.27054 5.60674C2.21395 4.82579 3.00021 3.1589 4.27485 3.47756L14.0608 5.92406L17.1916 2.7933C17.6424 2.34244 18.254 1.98663 18.8286 1.72758ZM18.5828 4.23053L15.1548 7.65856C14.8567 7.95662 14.4241 8.07643 14.0152 7.9742L7.70352 6.39628L11.5932 9.27129C12.1832 9.70735 12.2473 10.5661 11.7285 11.0848L8.05676 14.7566C7.85123 14.9621 7.57808 15.086 7.28807 15.1054L4.91621 15.2635L7.31557 16.9246L8.79804 19.1483L9.12556 16.8556C9.16228 16.5986 9.28139 16.3604 9.46498 16.1768L13.1427 12.499C13.6615 11.9803 14.5202 12.0443 14.9562 12.6343L17.8312 16.524L16.2533 10.2123C16.1511 9.80342 16.2709 9.37083 16.569 9.07277L19.997 5.64474C20.0811 5.54456 20.4407 5.10051 20.6767 4.57691C20.9648 3.93787 20.8835 3.64788 20.7316 3.49604C20.5796 3.34411 20.2895 3.26286 19.6505 3.5509C19.127 3.78691 18.683 4.14648 18.5828 4.23053Z" />
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-[#001d3d]">Daftar Akun Baru</h2>
        <p class="text-gray-500 font-semibold mt-2 text-sm">Bergabung dengan program AeroMiles</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-2xl">
        <h3 class="text-lg font-bold text-gray-800 mb-1">Registrasi</h3>
        <p class="text-xs text-gray-500 mb-6 font-semibold">Pilih peran dan lengkapi data Anda</p>

        <form action="" method="POST" id="registerForm">
            {% csrf_token %}
            
            <input type="hidden" name="role" id="roleInput" value="member">

            <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
                <button type="button" id="btnMember" class="flex-1 py-2 text-sm font-bold bg-white text-gray-800 rounded-lg shadow-sm transition-all">
                    Member
                </button>
                <button type="button" id="btnStaf" class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 transition-all">
                    Staf
                </button>
            </div>

            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
                    <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Password <span class="text-red-500">*</span></label>
                        <input type="password" name="password" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Konfirmasi Password <span class="text-red-500">*</span></label>
                        <input type="password" name="confirm_password" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                </div>
            </div>

            <hr class="mb-6 border-gray-200">

            <h4 class="text-sm font-bold text-gray-800 mb-4">Data Pribadi</h4>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Salutation <span class="text-red-500">*</span></label>
                    <select name="salutation" required class="w-full md:w-1/3 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Pilih</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Dr.">Dr.</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Nama Depan <span class="text-red-500">*</span></label>
                        <input type="text" name="first_name" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Nama Belakang <span class="text-red-500">*</span></label>
                        <input type="text" name="last_name" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Kewarganegaraan <span class="text-red-500">*</span></label>
                        <select name="nationality" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">Pilih negara</option>
                            <option value="ID">Indonesia</option>
                            <option value="SG">Singapore</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <div class="w-1/3">
                            <label class="block text-xs font-bold text-gray-700 mb-1">Country Code</label>
                            <select name="country_code" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="+62">+62</option>
                                <option value="+65">+65</option>
                            </select>
                        </div>
                        <div class="w-2/3">
                            <label class="block text-xs font-bold text-gray-700 mb-1">Nomor HP <span class="text-red-500">*</span></label>
                            <input type="text" name="phone" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Tanggal Lahir <span class="text-red-500">*</span></label>
                    <input type="date" name="dob" required class="w-full md:w-1/2 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div id="stafSection" class="hidden">
                <hr class="mb-4 border-gray-200">
                <h4 class="text-sm font-bold text-gray-800 mb-4">Data Staf</h4>
                <div class="mb-6">
                    <label class="block text-xs font-bold text-gray-700 mb-1">Kode Maskapai <span class="text-red-500">*</span></label>
                    <select name="airline_code" id="airlineCodeInput" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Pilih maskapai</option>
                        <option value="GA">Garuda Indonesia (GA)</option>
                        <option value="SQ">Singapore Airlines (SQ)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full hover:bg-blue-950 bg-blue-900 text-white font-bold py-3 rounded-xl transition shadow-md">
                Daftar
            </button>

        </form>
    </div>
</div>

<script>
    const btnMember = document.getElementById('btnMember');
    const btnStaf = document.getElementById('btnStaf');
    const stafSection = document.getElementById('stafSection');
    const roleInput = document.getElementById('roleInput');
    const airlineCodeInput = document.getElementById('airlineCodeInput');

    // Class Tailwind untuk status tombol Aktif dan Tidak Aktif
    const activeClasses = ['bg-white', 'text-gray-800', 'shadow-sm', 'font-bold'];
    const inactiveClasses = ['text-gray-500', 'hover:text-gray-700', 'font-medium'];

    function setRole(role) {
        if (role === 'member') {
            // Set input hidden
            roleInput.value = 'member';
            
            // Ubah gaya tombol Member jadi aktif
            btnMember.classList.add(...activeClasses, 'rounded-lg');
            btnMember.classList.remove(...inactiveClasses);
            
            // Ubah gaya tombol Staf jadi tidak aktif
            btnStaf.classList.add(...inactiveClasses);
            btnStaf.classList.remove(...activeClasses, 'rounded-lg');
            
            // Sembunyikan form staf dan matikan wajib isi (required)
            stafSection.classList.add('hidden');
            airlineCodeInput.removeAttribute('required');

        } else if (role === 'staf') {
            // Set input hidden
            roleInput.value = 'staf';
            
            // Ubah gaya tombol Staf jadi aktif
            btnStaf.classList.add(...activeClasses, 'rounded-lg');
            btnStaf.classList.remove(...inactiveClasses);
            
            // Ubah gaya tombol Member jadi tidak aktif
            btnMember.classList.add(...inactiveClasses);
            btnMember.classList.remove(...activeClasses, 'rounded-lg');
            
            // Tampilkan form staf dan nyalakan wajib isi (required)
            stafSection.classList.remove('hidden');
            airlineCodeInput.setAttribute('required', 'required');
        }
    }

    // Pasang event listener ke tombol
    btnMember.addEventListener('click', () => setRole('member'));
    btnStaf.addEventListener('click', () => setRole('staf'));
</script>
{% endblock %}
