{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <h1 class="text-2xl font-bold mb-6 text-gray-900">Pengaturan Profil</h1>

        <!-- Card Data Profil -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 mb-6">
            <h2 class="text-xl font-bold mb-6 text-gray-800">Data Profil</h2>
            
            <form id="profileForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" value="john@example.com" class="w-full px-3 py-2 border bg-gray-100 text-gray-500 rounded-lg cursor-not-allowed" readonly>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nomor Member</label>
                        <input type="text" value="M0001" class="w-full px-3 py-2 border bg-gray-100 text-gray-500 rounded-lg cursor-not-allowed" readonly>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Tanggal Bergabung</label>
                        <input type="text" value="2024-01-15" class="w-full px-3 py-2 border bg-gray-100 text-gray-500 rounded-lg cursor-not-allowed" readonly>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Salutation</label>
                    <select id="salutation" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                        <option value="Mr." selected>Mr.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Ms.">Ms.</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nama Depan</label>
                        <input type="text" id="firstName" value="John" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nama Tengah</label>
                        <input type="text" id="midName" value="William" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nama Belakang</label>
                        <input type="text" id="lastName" value="Doe" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Kewarganegaraan</label>
                        <select id="citizenship" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="Indonesia" selected>Indonesia</option>
                            <option value="Singapore">Singapore</option>
                            <option value="Malaysia">Malaysia</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Country Code</label>
                        <select id="countryCode" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="+62" selected>+62</option>
                            <option value="+65">+65</option>
                            <option value="+60">+60</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Nomor HP</label>
                        <input type="text" id="phone" value="81234567890" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Tanggal Lahir</label>
                    <div class="relative">
                        <input type="text" id="dob" value="15/05/1990" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none pr-10">
                        <i class="far fa-calendar absolute right-3 top-3 text-gray-400"></i>
                    </div>
                </div>

                <div class="pt-4 flex justify-end">
                    <button type="submit" class="bg-[#0a2540] text-white px-6 py-2 rounded-lg font-medium w-full sm:w-auto hover:bg-blue-900 transition">Simpan Perubahan</button>
                </div>
            </form>
        </div>

        <!-- Card Ubah Password -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Ubah Password</h2>
            <button onclick="openModal('passwordModal')" class="border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 transition font-medium">Ubah Password</button>
        </div>

    </div>
</div>

<!-- Modal Ubah Password -->
<div id="passwordModal" class="fixed inset-0 z-50 hidden overflow-y-auto bg-black/75 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        <div class="flex justify-between items-center p-6 border-b border-gray-100">
            <h3 class="text-lg font-bold text-gray-900">Ubah Password</h3>
            <button onclick="closeModal('passwordModal')" class="text-gray-400 hover:text-gray-500 text-2xl leading-none">&times;</button>
        </div>
        
        <form id="passwordForm" class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Password Lama</label>
                <input type="password" id="oldPass" required class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Password Baru</label>
                <input type="password" id="newPass" required class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none bg-gray-50">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
                <input type="password" id="confirmPass" required class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none bg-gray-50">
            </div>
            <div class="pt-4 flex justify-end">
                <button type="submit" class="bg-[#0a2540] text-white px-6 py-2 rounded-lg font-medium w-full sm:w-auto hover:bg-blue-900 transition">Simpan</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Logika Toggle Modal
    function openModal(id) { 
        document.getElementById(id).classList.remove('hidden'); 
    }
    
    function closeModal(id) { 
        document.getElementById(id).classList.add('hidden'); 
    }

    // Menutup modal jika klik di luar area konten modal
    window.onclick = function(event) {
        let modal = document.getElementById('passwordModal');
        if (event.target == modal) { 
            closeModal('passwordModal'); 
        }
    }

    // Skenario 1: Update Profil
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            salutation: document.getElementById('salutation').value,
            name: document.getElementById('firstName').value + " " + document.getElementById('lastName').value,
            phone: document.getElementById('phone').value
        };
        
        console.log("Memvalidasi dan menyimpan data...", data);
        alert("Perubahan profil berhasil disimpan!");
    });

    // Skenario 2: Ubah Password
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const oldPass = document.getElementById('oldPass').value;
        const newPass = document.getElementById('newPass').value;
        const confirmPass = document.getElementById('confirmPass').value;

        if (newPass !== confirmPass) {
            alert("Konfirmasi password baru tidak cocok!");
            return;
        }

        if (oldPass === "password123") {
            alert("Password berhasil diperbarui!");
            closeModal('passwordModal');
            this.reset();
        } else {
            alert("Password lama salah!");
        }
    });
</script>

{% endblock %}
